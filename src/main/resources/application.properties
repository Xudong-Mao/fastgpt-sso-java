# Server Configuration
server.port=${SERVER_PORT:8080}

# Application Configuration
spring.application.name=${SPRING_APPLICATION_NAME:fastgpt-sso-java}

# SSO Provider: test | weaver
app.sso.provider=${APP_SSO_PROVIDER:weaver}
app.auth.token=${APP_AUTH_TOKEN:}
app.redirect.enabled=${APP_REDIRECT_ENABLED:false}
app.hostname=${APP_HOSTNAME:}

# ========== 泛微 Ecology SSO 配置 ==========
# 是否启用泛微SSO
weaver.sso.enabled=${WEAVER_SSO_ENABLED:true}
# CAS 服务端地址（泛微OA地址）
weaver.sso.server-url=${WEAVER_SSO_SERVER_URL:}
# CAS 登录路径
weaver.sso.login-path=${WEAVER_SSO_LOGIN_PATH:/login/login.jsp}
# CAS Ticket 校验路径
weaver.sso.validate-path=${WEAVER_SSO_VALIDATE_PATH:/sso/serviceValidate}
# 应用标识（在泛微统一认证中心注册时分配）
weaver.sso.app-id=${WEAVER_SSO_APP_ID:fastgpt}
# 本服务的外网可达地址（用于CAS回调）
weaver.sso.server-name=${WEAVER_SSO_SERVER_NAME:http://localhost:8080}
# 回调接口路径
weaver.sso.callback-path=${WEAVER_SSO_CALLBACK_PATH:/login/oauth/callback}
# HR同步接口认证Token
weaver.sso.hr-sync-token=${WEAVER_SSO_HR_SYNC_TOKEN:}

# ========== CAS 返回属性映射 ==========
# 用户名字段
weaver.sso.attribute.username=${WEAVER_SSO_ATTR_USERNAME:loginid}
# 姓名字段
weaver.sso.attribute.member-name=${WEAVER_SSO_ATTR_MEMBER_NAME:lastname}
# 邮箱字段
weaver.sso.attribute.email=${WEAVER_SSO_ATTR_EMAIL:email}
# 手机号字段
weaver.sso.attribute.mobile=${WEAVER_SSO_ATTR_MOBILE:mobile}
